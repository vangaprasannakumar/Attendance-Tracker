<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Capco Workforce</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/t4QKR4y1/Attendance-Tracker.png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/t4QKR4y1/Attendance-Tracker.png">
    <link rel="manifest" href="manifest.json">
    
    <meta name="theme-color" content="#09090b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Capco HR">

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #09090b; overflow: hidden; font-family: sans-serif; }
        
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; z-index: 10; }
        
        #loader { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 50; background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.15), transparent 50%), #09090b; color: #f4f4f5; transition: opacity 0.5s ease; }
        #loader img { width: 85px; border-radius: 20px; margin-bottom: 25px; animation: pulse 1.5s infinite; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        #loader h3 { font-weight: 500; letter-spacing: 1px; font-size: 18px; margin: 0; color: #e2e8f0; }
        
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.8; } }
        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="loader">
        <img src="https://i.postimg.cc/t4QKR4y1/Attendance-Tracker.png" alt="Capco Logo">
        <h3>Secure Connection...</h3>
    </div>

    <iframe id="app-frame" src="https://script.google.com/macros/s/AKfycbzsV8eP3nMkVUva7WwHkDKi820Mv0BEm0kTxxM__EamMerhKdhxQJKtVRA0mSI0_EjK/exec"></iframe>

    <script>
        // Register Service Worker for offline installation capability
        if ('serviceWorker' in navigator) { 
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration bypassed.')); 
        }

        const loader = document.getElementById('loader');
        const iframe = document.getElementById('app-frame');

        function hideLoader() {
            loader.classList.add('hidden');
            setTimeout(() => { loader.style.display = 'none'; }, 500);
        }

        // Hide loader when the Google Script sends the page
        iframe.onload = hideLoader;

        // Failsafe: Force hide after 4 seconds
        setTimeout(hideLoader, 4000);
    </script>
</body>
</html>
