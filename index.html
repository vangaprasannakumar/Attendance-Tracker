<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Capco Workforce</title>
    <link rel="icon" type="image/jpeg" href="https://i.postimg.cc/k5YhWmTg/Logo.jpg?v=final">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/k5YhWmTg/Logo.jpg?v=final">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#09090b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #09090b; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>
    <iframe src="https://script.google.com/macros/s/AKfycbzsV8eP3nMkVUva7WwHkDKi820Mv0BEm0kTxxM__EamMerhKdhxQJKtVRA0mSI0_EjK/exec" allow="camera *; microphone *; display-capture *"></iframe>

    <script>
        // Force phone to clear old broken cache!
        if ('serviceWorker' in navigator) { 
            navigator.serviceWorker.getRegistrations().then(function(r) { for(let i of r) i.unregister(); });
        }
    </script>
</body>
</html>
