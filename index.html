<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AI Face Diagnostic Test</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <style>
        body { font-family: sans-serif; text-align: center; background: #111; color: #fff; padding: 20px; margin: 0; }
        .video-wrapper { 
            position: relative; 
            width: 100%; 
            max-width: 400px; 
            height: 400px; 
            margin: 20px auto; 
            border: 3px solid #3b82f6; 
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }
        /* Make sure video and canvas stack perfectly */
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror effect */
        }
        button {
            padding: 15px 25px; margin: 10px; font-size: 16px; font-weight: bold;
            background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer;
        }
        button:disabled { background: #555; color: #888; cursor: not-allowed; }
        #status-log { font-size: 18px; font-weight: bold; color: #10b981; margin: 15px 0; min-height: 25px; }
        #data-log { font-size: 12px; color: #aaa; word-wrap: break-word; background: #222; padding: 10px; border-radius: 8px; display: none; }
    </style>
</head>
<body>

    <h2>AI Diagnostic Lab</h2>
    <div id="status-log">⏳ Downloading AI Models (Please wait ~10s)...</div>

    <div>
        <button id="btn-enroll" onclick="startEnrollment()" disabled>1. Enroll Face</button>
        <button id="btn-kiosk" onclick="startKiosk()" disabled>2. Test Kiosk</button>
    </div>

    <div class="video-wrapper">
        <video id="video" autoplay muted playsinline webkit-playsinline></video>
        <canvas id="overlay"></canvas>
    </div>

    <div id="data-log"></div>

    <script>
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const statusLog = document.getElementById('status-log');
        const dataLog = document.getElementById('data-log');

        let isScanning = false;
        let faceMatcher = null;
        
        // Dummy Database
        let mockEmployee = {
            id: "EMP100",
            name: "Prasanna",
            faceData: "" // Will hold the JSON string after enrollment
        };

        // 1. Load Models on startup
        async function loadModels() {
            try {
                const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
                
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                
                statusLog.innerText = "✅ AI Ready. Click 'Enroll Face'.";
                document.getElementById('btn-enroll').disabled = false;
                
                // Warm up AI
                const dummyCanvas = document.createElement('canvas'); 
                dummyCanvas.width = 160; dummyCanvas.height = 160;
                await faceapi.detectSingleFace(dummyCanvas, new faceapi.TinyFaceDetectorOptions());
            } catch (err) {
                statusLog.style.color = "#ef4444";
                statusLog.innerText = "❌ Model Load Error: " + err.message;
            }
        }

        // Helper to start camera safely
        async function openCamera() {
            isScanning = false; 
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(t => t.stop());
            }
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
            
            // Wait for video to actually be playing and have dimensions
            return new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    video.play();
                };
                video.onplay = () => {
                    // Check every 100ms until video width is valid
                    const checkVideoReady = setInterval(() => {
                        if (video.readyState >= 3 && video.videoWidth > 0) {
                            clearInterval(checkVideoReady);
                            
                            // Size the canvas to match the video
                            overlay.width = video.videoWidth;
                            overlay.height = video.videoHeight;
                            faceapi.matchDimensions(overlay, { width: video.videoWidth, height: video.videoHeight });
                            
                            resolve();
                        }
                    }, 100);
                };
            });
        }

        // 2. ENROLLMENT PROCESS
        async function startEnrollment() {
            statusLog.style.color = "#f59e0b";
            statusLog.innerText = "Opening camera...";
            document.getElementById('btn-kiosk').disabled = true;

            try {
                await openCamera();
                statusLog.innerText = "Look directly at camera. Finding face...";
                isScanning = true;
                
                const TARGET_SAMPLES = 5;
                let collectedDescriptors = [];
                
                async function scanLoop() {
                    if (!isScanning) return;
                    
                    try {
                        // Using higher inputSize (320) and lower threshold (0.3) for mobile
                        const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.3 }))
                                                       .withFaceLandmarks()
                                                       .withFaceDescriptor();
                        
                        const ctx = overlay.getContext('2d');
                        ctx.clearRect(0, 0, overlay.width, overlay.height);

                        if (detection) {
                            // DRAW THE BOX AROUND THE FACE SO YOU KNOW IT WORKS
                            faceapi.draw.drawDetections(overlay, faceapi.resizeResults(detection, overlay));

                            collectedDescriptors.push(Array.from(detection.descriptor));
                            statusLog.innerText = `Capturing Frame ${collectedDescriptors.length} of ${TARGET_SAMPLES}...`;

                            if (collectedDescriptors.length >= TARGET_SAMPLES) {
                                isScanning = false; // Stop loop
                                
                                // Save to dummy database
                                mockEmployee.faceData = JSON.stringify(collectedDescriptors);
                                
                                // Rebuild Matcher
                                const descriptors = collectedDescriptors.map(d => new Float32Array(d));
                                const labeledDesc = new faceapi.LabeledFaceDescriptors(mockEmployee.id, descriptors);
                                faceMatcher = new faceapi.FaceMatcher([labeledDesc], 0.6); // 0.6 threshold

                                statusLog.style.color = "#10b981";
                                statusLog.innerText = "✅ Enrollment Saved! Click 'Test Kiosk' now.";
                                document.getElementById('btn-kiosk').disabled = false;
                                
                                // Show raw data
                                dataLog.style.display = "block";
                                dataLog.innerText = "Data saved: " + mockEmployee.faceData.substring(0, 100) + "...";
                                return;
                            }
                        } else {
                            statusLog.innerText = "No face detected. Move to better light.";
                        }
                    } catch (e) {
                        console.error(e);
                    }
                    
                    if (isScanning) setTimeout(scanLoop, 250);
                }
                scanLoop();
            } catch (e) {
                statusLog.innerText = "Camera Error: " + e.message;
            }
        }

        // 3. KIOSK RECOGNITION PROCESS
        async function startKiosk() {
            if (!faceMatcher) return alert("You must enroll first!");
            statusLog.style.color = "#3b82f6";
            statusLog.innerText = "Opening camera for Kiosk...";

            try {
                await openCamera();
                statusLog.innerText = "Scanning for enrolled faces...";
                isScanning = true;

                async function scanLoop() {
                    if (!isScanning) return;
                    
                    try {
                        const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.3 }))
                                                       .withFaceLandmarks()
                                                       .withFaceDescriptor();
                        
                        const ctx = overlay.getContext('2d');
                        ctx.clearRect(0, 0, overlay.width, overlay.height);

                        if (detection) {
                            // Draw box
                            const resizedDet = faceapi.resizeResults(detection, overlay);
                            faceapi.draw.drawDetections(overlay, resizedDet);

                            // Match Face
                            const bestMatch = faceMatcher.findBestMatch(detection.descriptor);
                            
                            if (bestMatch.label !== 'unknown') {
                                // Draw name over box
                                const drawBox = new faceapi.draw.DrawBox(resizedDet.detection.box, { label: mockEmployee.name });
                                drawBox.draw(overlay);

                                statusLog.style.color = "#10b981";
                                statusLog.innerText = `✅ Verified: ${mockEmployee.name} (${bestMatch.distance.toFixed(2)})`;
                            } else {
                                statusLog.style.color = "#ef4444";
                                statusLog.innerText = "❌ Face found, but NOT RECOGNIZED.";
                            }
                        } else {
                            statusLog.style.color = "#f59e0b";
                            statusLog.innerText = "Looking for a face...";
                        }
                    } catch (e) {
                        console.error(e);
                    }
                    if (isScanning) setTimeout(scanLoop, 200);
                }
                scanLoop();
            } catch (e) {
                statusLog.innerText = "Camera Error: " + e.message;
            }
        }

        // Start initialization
        window.onload = loadModels;

    </script>
</body>
</html>
