<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Attendance</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/t4QKR4y1/Attendance-Tracker.png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/t4QKR4y1/Attendance-Tracker.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#09090b">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #09090b; overflow: hidden; font-family: sans-serif; }
        
        /* The Iframe starts invisible (opacity 0) */
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; z-index: 10; opacity: 0; transition: opacity 0.5s ease; }
        
        /* The Loading Screen */
        #loader { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5; color: #a1a1aa; }
        #loader img { width: 80px; border-radius: 20px; margin-bottom: 20px; animation: pulse 1.5s infinite; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.8; } }
    </style>
</head>
<body>

    <div id="loader">
        <img src="https://i.postimg.cc/t4QKR4y1/Attendance-Tracker.png" alt="Logo">
        <h3 style="font-weight: 500;">Starting Capco System...</h3>
    </div>

    <iframe src="https://script.google.com/macros/s/AKfycbzsV8eP3nMkVUva7WwHkDKi820Mv0BEm0kTxxM__EamMerhKdhxQJKtVRA0mSI0_EjK/exec" onload="this.style.opacity='1'; setTimeout(() => document.getElementById('loader').style.display='none', 500);"></iframe>

    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
