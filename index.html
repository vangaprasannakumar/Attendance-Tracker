<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Attendance</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/t4QKR4y1/Attendance-Tracker.png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/t4QKR4y1/Attendance-Tracker.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#09090b">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #09090b; overflow: hidden; font-family: sans-serif; }
        
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; z-index: 10; }
        
        #loader { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 50; background-color: #09090b; color: #a1a1aa; transition: opacity 0.5s ease; }
        #loader img { width: 80px; border-radius: 20px; margin-bottom: 20px; animation: pulse 1.5s infinite; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.8; } }
        
        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="loader">
        <img src="https://i.postimg.cc/t4QKR4y1/Attendance-Tracker.png" alt="Logo">
        <h3 style="font-weight: 500; color: white;">Loading System...</h3>
    </div>

    <iframe id="app-frame" src="https://script.google.com/macros/s/AKfycbzsV8eP3nMkVUva7WwHkDKi820Mv0BEm0kTxxM__EamMerhKdhxQJKtVRA0mSI0_EjK/exec"></iframe>

    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        const loader = document.getElementById('loader');
        const iframe = document.getElementById('app-frame');

        function hideLoader() {
            loader.classList.add('hidden');
            setTimeout(() => { loader.style.display = 'none'; }, 500);
        }

        // Hide loader as soon as the iframe finishes loading
        iframe.onload = hideLoader;

        // FAILSAFE: If Google is slow, force the loader to hide after 4 seconds anyway!
        setTimeout(hideLoader, 4000);
    </script>
</body>
</html>
